name: GVR Kaggle GPU Training

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */8 * * *'

jobs:
  train-on-kaggle:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Kaggle CLI
        run: pip install kaggle -q

      - name: Configure Kaggle
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          mkdir -p ~/.kaggle
          cat > ~/.kaggle/kaggle.json << EOF
          {"username":"${KAGGLE_USERNAME}","key":"${KAGGLE_KEY}"}
          EOF
          chmod 600 ~/.kaggle/kaggle.json
          echo "Username: $KAGGLE_USERNAME"
          kaggle config view

      - name: Prepare kernel
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p kaggle_push
          
          # Inject GitHub token
          sed "s|TOKEN = os.environ.get(\"GITHUB_TOKEN\", \"\")|TOKEN = \"$GITHUB_TOKEN\"|g" \
            kaggle_kernel/gvr_kaggle_train.py > kaggle_push/gvr_kaggle_train.py
          
          # Create metadata with real username
          cat > kaggle_push/kernel-metadata.json << EOF
          {
            "id": "${KAGGLE_USERNAME}/gvr-gpu-training",
            "title": "GVR GPU Training",
            "code_file": "gvr_kaggle_train.py",
            "language": "python",
            "kernel_type": "script",
            "is_private": true,
            "enable_gpu": true,
            "enable_internet": true,
            "dataset_sources": [],
            "competition_sources": [],
            "kernel_sources": []
          }
          EOF
          
          echo "Kernel files ready:"
          ls -la kaggle_push/
          cat kaggle_push/kernel-metadata.json

      - name: Push to Kaggle
        run: |
          cd kaggle_push
          kaggle kernels push -p . 2>&1 || true
          echo "Push attempted"

      - name: Wait 130 minutes
        run: |
          echo "Training in progress on Kaggle GPU..."
          echo "Started: $(date)"
          sleep 7800
          echo "Finished: $(date)"

      - name: Get results
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
        run: |
          mkdir -p kaggle_output
          kaggle kernels output ${KAGGLE_USERNAME}/gvr-gpu-training -p kaggle_output/ 2>&1 || echo "Download attempted"
          ls -la kaggle_output/ 2>/dev/null || echo "No outputs yet"

      - name: Save and commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p checkpoints
          if [ -f "kaggle_output/gvr_checkpoint.pt" ]; then
            cp kaggle_output/gvr_checkpoint.pt checkpoints/gvr_checkpoint.pt
            echo "Checkpoint found!"
            ls -lh checkpoints/gvr_checkpoint.pt
          fi
          
          git config user.email "gvr@bot.com"
          git config user.name "GVR Bot"
          git add checkpoints/ 2>/dev/null || true
          git diff --cached --quiet || git commit -m "GVR: checkpoint $(date '+%Y-%m-%d %H:%M')"
          git push || echo "Nothing to push"
