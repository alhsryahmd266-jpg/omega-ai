name: GVR Kaggle API Test v2

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Test Kaggle + Save via GitHub API
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: "alhsryahmd266-jpg/omega-ai"
        run: |
          pip install requests -q

          python3 - << 'EOF'
          import requests, os, json, base64

          u = os.environ.get("KAGGLE_USERNAME", "MISSING")
          k = os.environ.get("KAGGLE_KEY", "MISSING")
          gh_token = os.environ.get("GH_TOKEN", "")
          gh_repo = os.environ.get("GH_REPO", "")

          print(f"Username: '{u}'")
          print(f"Key: '{k[:8]}...' (len={len(k)})")

          results = {"username": u, "key_len": len(k), "tests": {}}

          # Test Kaggle API
          try:
              r = requests.get(
                  "https://www.kaggle.com/api/v1/kernels",
                  auth=(u, k),
                  params={"mine": True, "pageSize": 3},
                  timeout=30
              )
              results["tests"]["list_kernels"] = {
                  "status": r.status_code,
                  "response": r.text[:200]
              }
              print(f"Kaggle API: {r.status_code}")
              print(r.text[:300])
          except Exception as e:
              results["tests"]["list_kernels"] = {"error": str(e)}
              print(f"Error: {e}")

          # Save result to GitHub via API
          content_b64 = base64.b64encode(
              json.dumps(results, indent=2).encode()
          ).decode()

          # Check if file exists
          check = requests.get(
              f"https://api.github.com/repos/{gh_repo}/contents/kaggle_test_result.json",
              headers={"Authorization": f"token {gh_token}"}
          )
          
          body = {"message": "GVR: Kaggle API test result", "content": content_b64}
          if check.status_code == 200:
              body["sha"] = check.json()["sha"]

          save = requests.put(
              f"https://api.github.com/repos/{gh_repo}/contents/kaggle_test_result.json",
              headers={"Authorization": f"token {gh_token}", "Content-Type": "application/json"},
              json=body
          )
          print(f"Save to GitHub: {save.status_code}")
          if save.status_code not in [200, 201]:
              print(save.text[:200])
          else:
              print("✅ Saved to GitHub!")
          EOF
