name: GVR HuggingFace Training

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */8 * * *'

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install torch requests huggingface_hub -q

      - name: Setup HF repo
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python3 scripts/hf_setup.py

      - name: Train GVR & Upload to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python3 scripts/hf_train_upload.py
