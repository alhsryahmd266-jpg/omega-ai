name: GVR Final Kaggle Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Test Kaggle & Report
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          pip install requests PyNaCl -q

          python3 - << 'EOF'
          import requests, os, json, base64

          u = os.environ.get("KAGGLE_USERNAME", "")
          k = os.environ.get("KAGGLE_KEY", "")
          pat = os.environ.get("GH_PAT", "")

          print(f"KAGGLE_USERNAME set: {bool(u)} (len={len(u)})")
          print(f"KAGGLE_KEY set: {bool(k)} (len={len(k)})")
          print(f"GH_PAT set: {bool(pat)} (len={len(pat)})")

          result = {
              "username_set": bool(u),
              "username_len": len(u),
              "key_set": bool(k),
              "key_len": len(k),
              "kaggle_test": {}
          }

          if u and k:
              try:
                  r = requests.get(
                      "https://www.kaggle.com/api/v1/kernels",
                      auth=(u, k),
                      params={"mine": True, "pageSize": 3},
                      timeout=30
                  )
                  result["kaggle_test"] = {
                      "status": r.status_code,
                      "ok": r.status_code == 200,
                      "response_preview": r.text[:300]
                  }
                  print(f"Kaggle API: {r.status_code}")
                  print(r.text[:300])
              except Exception as e:
                  result["kaggle_test"] = {"error": str(e)}
                  print(f"Error: {e}")

          # Save via GH_PAT
          content = base64.b64encode(json.dumps(result, indent=2).encode()).decode()
          check = requests.get(
              "https://api.github.com/repos/alhsryahmd266-jpg/omega-ai/contents/kaggle_final_test.json",
              headers={"Authorization": f"token {pat}"}
          )
          body = {"message": "GVR: Final Kaggle test", "content": content}
          if check.status_code == 200:
              body["sha"] = check.json()["sha"]
          
          save = requests.put(
              "https://api.github.com/repos/alhsryahmd266-jpg/omega-ai/contents/kaggle_final_test.json",
              headers={"Authorization": f"token {pat}"},
              json=body
          )
          print(f"Saved to GitHub: {save.status_code}")
          EOF
