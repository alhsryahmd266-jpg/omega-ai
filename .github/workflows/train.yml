name: Omega AI v2 - Train & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Validate, Train, Release
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu -q
          pip install numpy tqdm -q

      - name: Validate architecture
        run: |
          python3 << 'EOF'
          import sys, torch
          sys.path.insert(0,'.')
          from omega.model.architecture import OmegaConfig, OmegaModel

          cfg = OmegaConfig(
              vocab_size=512, dim=128, n_layers=3,
              n_heads=4, n_kv_heads=2, head_dim=32,
              n_experts=2, n_active_experts=1, n_shared_experts=1,
              expert_dim=128, ssm_d_state=8, ssm_expand=2,
              ssm_layers_freq=3, max_seq_len=64
          )
          m = OmegaModel(cfg)
          x = torch.randint(0, 512, (2, 32))
          logits, _ = m(x)
          assert logits.shape == (2, 32, 512), f"Wrong shape: {logits.shape}"
          out = m.generate(x[:1], max_new=5)
          assert out.shape[1] > 32
          print(f"Architecture OK | {m.count_params()/1e6:.2f}M params")
          EOF

      - name: Validate tokenizer
        run: |
          python3 << 'EOF'
          import sys
          sys.path.insert(0,'.')
          from omega.tokenizer.bpe import OmegaTokenizer

          tok = OmegaTokenizer(vocab_size=800)
          texts = [
              'الذكاء الاصطناعي مستقبل البشرية والتكنولوجيا',
              'Python programming language for AI and machine learning',
              'def hello_world(): return "مرحباً بالعالم"',
              'Android development with Kotlin and Jetpack Compose',
          ]
          tok.train(texts, min_freq=1, verbose=False)
          for t in texts[:2]:
              enc = tok.encode(t)
              dec = tok.decode(enc)
              assert len(enc) > 2, "Too short encoding"
          tok.save('/tmp/test_tok')
          tok2 = OmegaTokenizer.load('/tmp/test_tok')
          enc2 = tok2.encode('مرحباً Python')
          print(f"Tokenizer OK | vocab={len(tok.vocab)} | encoded={len(enc2)} tokens")
          EOF

      - name: Validate memory system
        run: |
          python3 << 'EOF'
          import sys, os
          sys.path.insert(0,'.')
          os.makedirs('/tmp/test_mem', exist_ok=True)
          from omega.memory.persistent import OmegaPersistentMemory

          mem = OmegaPersistentMemory('/tmp/test_mem/test.db')
          mem.remember('الذكاء الاصطناعي هو مستقبل التكنولوجيا', mtype='fact', importance=0.8)
          mem.remember('Python is great for AI development', mtype='fact')
          mem.remember_code('fibonacci', 'def fib(n): return n if n<=1 else fib(n-1)+fib(n-2)')

          results = mem.recall('الذكاء الاصطناعي')
          assert len(results) > 0, "Recall failed"
          stats = mem.stats()
          assert stats['total'] >= 3
          print(f"Memory OK | entries={stats['total']} | types={stats['by_type']}")
          mem.close()
          EOF

      - name: Prepare training data
        run: |
          mkdir -p data
          python3 scripts/prepare_data.py

      - name: Train Omega AI
        run: |
          CI=true python3 scripts/train_omega.py
        env:
          CI: true

      - name: Test full pipeline
        run: |
          python3 << 'EOF'
          import sys, torch, json, os
          sys.path.insert(0,'.')
          from omega.model.architecture import OmegaConfig, OmegaModel
          from omega.tokenizer.bpe import OmegaTokenizer
          from omega.memory.persistent import OmegaPersistentMemory
          from omega.agent.agent import OmegaAgent

          # Load trained model
          with open('checkpoints/config.json') as f:
              cfg = OmegaConfig(**json.load(f))
          model = OmegaModel(cfg)
          ck = 'checkpoints/omega_best.pt'
          if os.path.exists(ck):
              data = torch.load(ck, map_location='cpu')
              model.load_state_dict(data['model'])
              print(f"Loaded step={data['step']} loss={data['best_loss']:.4f}")
          model.eval()

          tok = OmegaTokenizer.load('checkpoints')
          mem = OmegaPersistentMemory('memory/omega.db')
          agent = OmegaAgent(model, tok, memory=mem)

          # Test inference
          for q in ['ما هو الذكاء الاصطناعي؟', 'def fibonacci']:
              r = agent.chat(q)
              print(f"Q: {q[:40]} | R: {r[:60]}")

          print(f"Pipeline OK | Memory: {mem.stats()}")
          mem.close()
          EOF

      - name: Generate model card
        run: |
          python3 << 'EOF'
          import json, os
          with open('checkpoints/config.json') as f:
              cfg = json.load(f)
          res = {}
          if os.path.exists('checkpoints/train_result.json'):
              with open('checkpoints/train_result.json') as f:
                  res = json.load(f)
          card = f"""# Omega AI v2

**معمارية متقدمة من الصفر**

## المكونات
- Grouped Query Attention (GQA)
- Mamba-style SSM Layers
- Mixture of Experts ({cfg.get('n_experts')} experts, {cfg.get('n_active_experts')} active)
- SwiGLU Activation
- RoPE (theta={cfg.get('rope_theta')})
- BPE Tokenizer ({cfg.get('vocab_size')} vocab)
- Persistent SQLite Memory
- Web Learner (يتعلم من الإنترنت)
- Self-Improver (يطور نفسه)
- Autonomous Agent

## نتائج التدريب
- Best Loss: {res.get('best_loss', 'N/A')}
- Steps: {res.get('steps', 'N/A')}
- Epochs: {res.get('epochs', 'N/A')}
"""
          with open('checkpoints/MODEL_CARD.md', 'w', encoding='utf-8') as f:
              f.write(card)
          print("Model card generated")
          EOF

      - name: Upload checkpoints
        uses: actions/upload-artifact@v4
        with:
          name: omega-ai-v2-build-${{ github.run_number }}
          path: checkpoints/
          retention-days: 90

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v2.0.${{ github.run_number }}"
          name: "Omega AI v2.0.${{ github.run_number }}"
          body: |
            ## Omega AI v2 - Build ${{ github.run_number }}

            ### المعمارية
            - GQA + SSM + MoE + SwiGLU + RoPE
            - ذاكرة دائمة SQLite
            - تعلم من الإنترنت تلقائياً
            - تطوير ذاتي مستمر
            - وكيل ذاتي بأدوات

            ### الـ Checkpoints في Artifacts أعلاه
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
