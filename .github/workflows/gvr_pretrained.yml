name: GVR-Ultimate Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup
        run: |
          pip install torch==2.1.0 requests huggingface_hub -q
          pip install transformers accelerate sentencepiece bitsandbytes -q

      - name: Build GVR-Ultimate
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python3 scripts/gvr_pretrained.py
