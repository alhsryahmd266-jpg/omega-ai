name: GVR Pretrained - HF Inference API

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  gvr-pretrained:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install base
        run: pip install torch requests huggingface_hub -q

      - name: Run GVR with Pre-trained Model
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python3 scripts/gvr_pretrained.py
