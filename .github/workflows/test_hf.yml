name: Test HF Token

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Test HF Token
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          python3 - << 'EOF'
          import requests, os, json, base64

          hf = os.environ.get("HF_TOKEN", "")
          pat = os.environ.get("GH_PAT", "")

          print(f"Token: {hf[:12]}... len={len(hf)}")

          r = requests.get(
              "https://huggingface.co/api/whoami",
              headers={"Authorization": f"Bearer {hf}"},
              timeout=15
          )
          print(f"Status: {r.status_code}")
          print(f"Response: {r.text[:300]}")

          result = {"status": r.status_code, "valid": r.status_code == 200}
          if r.status_code == 200:
              d = r.json()
              result["user"] = d.get("name")
              result["email"] = d.get("email", "hidden")
              result["plan"] = d.get("plan", {}).get("type", "free")
              print(f"✅ Valid! User={result['user']}")
          else:
              result["error"] = r.text[:100]
              print(f"❌ Invalid token")

          content = base64.b64encode(json.dumps(result, indent=2).encode()).decode()
          check = requests.get(
              "https://api.github.com/repos/alhsryahmd266-jpg/omega-ai/contents/hf_token_test.json",
              headers={"Authorization": f"token {pat}"}
          )
          body = {"message": "HF token test", "content": content}
          if check.status_code == 200:
              body["sha"] = check.json()["sha"]
          requests.put(
              "https://api.github.com/repos/alhsryahmd266-jpg/omega-ai/contents/hf_token_test.json",
              headers={"Authorization": f"token {pat}"},
              json=body
          )
          print("Result saved!")
          EOF
