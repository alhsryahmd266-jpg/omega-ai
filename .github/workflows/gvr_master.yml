name: GVR Build Inline

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install all deps together
        run: |
          pip install torch transformers huggingface_hub sentencepiece requests accelerate -q
          python3 -c "import torch; print('torch:', torch.__version__)"
          python3 -c "from transformers import AutoModelForCausalLM; print('transformers import OK')"

      - name: Build GVR-Ultimate
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python3 scripts/gvr_build.py
