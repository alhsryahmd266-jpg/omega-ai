name: GVR Build Inline

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install
        run: |
          pip install torch==2.1.0 --index-url https://download.pytorch.org/whl/cpu -q
          pip install transformers huggingface_hub sentencepiece requests -q

      - name: Load + Test + Upload (all-in-one with error capture)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          python3 - << 'EOF'
          import os, sys, json, base64, time, traceback, requests

          HF_TOKEN = os.environ.get("HF_TOKEN","")
          GH_PAT = os.environ.get("GH_PAT","")
          HF_USER = "ahmedxg"

          def save(data):
              content = base64.b64encode(json.dumps(data,indent=2,ensure_ascii=False).encode()).decode()
              check = requests.get(
                  "https://api.github.com/repos/alhsryahmd266-jpg/omega-ai/contents/gvr_master_result.json",
                  headers={"Authorization":f"token {GH_PAT}"}
              )
              body = {"message":"GVR result","content":content}
              if check.status_code==200: body["sha"]=check.json()["sha"]
              requests.put(
                  "https://api.github.com/repos/alhsryahmd266-jpg/omega-ai/contents/gvr_master_result.json",
                  headers={"Authorization":f"token {GH_PAT}"},json=body
              )

          try:
              import torch
              from transformers import AutoTokenizer, AutoModelForCausalLM
              
              MODEL = "Qwen/Qwen2.5-0.5B-Instruct"
              print(f"Token: {HF_TOKEN[:8]}... len={len(HF_TOKEN)}")
              print(f"Loading tokenizer for {MODEL}...")
              
              tok = AutoTokenizer.from_pretrained(MODEL, token=HF_TOKEN, trust_remote_code=True)
              print("Tokenizer OK")
              
              print("Loading model...")
              mdl = AutoModelForCausalLM.from_pretrained(
                  MODEL, token=HF_TOKEN, torch_dtype=torch.float32, trust_remote_code=True
              )
              mdl.eval()
              p = sum(x.numel() for x in mdl.parameters())
              print(f"Model loaded: {p/1e6:.0f}M params")
              
              # quick generation test
              msgs=[{"role":"user","content":"Say hi"}]
              txt=tok.apply_chat_template(msgs,tokenize=False,add_generation_prompt=True)
              ids=tok(txt,return_tensors="pt")
              with torch.no_grad():
                  out=mdl.generate(**ids,max_new_tokens=10,pad_token_id=tok.eos_token_id)
              ans=tok.decode(out[0][len(ids.input_ids[0]):],skip_special_tokens=True)
              print(f"Test answer: {ans}")
              
              save({"status":"MODEL_LOADED","params_M":p/1e6,"test_answer":ans,"ts":time.strftime("%Y-%m-%d %H:%M:%S")})
              print("SUCCESS - saved!")
              
          except Exception as e:
              tb = traceback.format_exc()
              print(f"ERROR: {e}")
              print(tb)
              save({"status":"ERROR","error":str(e),"traceback":tb,"ts":time.strftime("%Y-%m-%d %H:%M:%S")})
              sys.exit(1)
          EOF
