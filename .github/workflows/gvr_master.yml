name: GVR Master Complete Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run GVR Master Build
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python3 scripts/gvr_master.py
