name: Test Kaggle Connectivity (No Auth Needed)
on: workflow_dispatch
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test Kaggle reachability from GitHub servers
        run: |
          echo "=== www.kaggle.com ==="
          curl -s -o /dev/null -w "HTTP: %{http_code}\n" https://www.kaggle.com
          echo "=== api.kaggle.com ==="
          curl -s -o /dev/null -w "HTTP: %{http_code}\n" https://api.kaggle.com
          echo "=== kaggle.com (no www) ==="
          curl -s -o /dev/null -w "HTTP: %{http_code}\n" https://kaggle.com
          echo "=== www.kaggle.com/api/v1/competitions/list (no token, expect 401 not block) ==="
          curl -s -w "\nHTTP: %{http_code}\n" https://www.kaggle.com/api/v1/competitions/list
