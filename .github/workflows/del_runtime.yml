name: Del Runtime
on:
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - run: pip install huggingface_hub requests -q
      - env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python3 scripts/del_runtime.py
