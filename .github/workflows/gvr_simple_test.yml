name: GVR Kaggle Test Simple

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Test Kaggle API
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          pip install requests -q
          
          python3 - << 'EOF'
          import requests, os, json

          u = os.environ.get("KAGGLE_USERNAME", "")
          k = os.environ.get("KAGGLE_KEY", "")

          print(f"Username: '{u}'")
          print(f"Key length: {len(k)}")

          if not u or not k:
              print("ERROR: Credentials missing!")
              exit(1)

          # Test 1: List kernels
          r1 = requests.get(
              "https://www.kaggle.com/api/v1/kernels",
              auth=(u, k),
              params={"mine": True, "pageSize": 5}
          )
          print(f"List kernels: {r1.status_code}")
          print(r1.text[:300])

          # Save result
          result = {
              "username": u,
              "key_length": len(k),
              "list_status": r1.status_code,
              "list_response": r1.text[:200]
          }
          
          with open("kaggle_api_test.json", "w") as f:
              json.dump(result, f, indent=2)

          print("File written!")
          EOF

      - name: Commit test result
        run: |
          git config user.email "bot@gvr.com"
          git config user.name "GVR Test Bot"
          
          ls -la kaggle_api_test.json 2>/dev/null || echo "File missing!"
          
          git add kaggle_api_test.json 2>/dev/null || true
          git status
          git commit -m "GVR: Kaggle API test result" --allow-empty 2>/dev/null || true
          
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/alhsryahmd266-jpg/omega-ai.git
          git push origin main 2>&1 || echo "Push failed"
