name: AION Kaggle GPU Bridge

on:
  workflow_dispatch:
    inputs:
      max_minutes:
        description: 'Training minutes on Kaggle'
        default: '120'
        required: false
  schedule:
    - cron: '0 */14 * * *'

permissions:
  contents: write

jobs:
  kaggle-train:
    name: Push Run Pull Kaggle GPU
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Kaggle CLI
        run: pip install kaggle -q

      - name: Configure Kaggle credentials
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          if [ -z "$KAGGLE_USERNAME" ] || [ -z "$KAGGLE_KEY" ]; then
            echo "::error::KAGGLE secrets missing"
            exit 1
          fi
          mkdir -p ~/.kaggle
          echo "$KAGGLE_KEY" > ~/.kaggle/access_token
          chmod 600 ~/.kaggle/access_token
          echo "{\"username\":\"$KAGGLE_USERNAME\",\"key\":\"$KAGGLE_KEY\"}" > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json
          echo "KAGGLE_API_TOKEN=$KAGGLE_KEY" >> "$GITHUB_ENV"

      - name: Push training kernel to Kaggle
        env:
          AION_MAX_MINUTES: ${{ github.event.inputs.max_minutes || '120' }}
        run: |
          cd kaggle_kernel
          kaggle kernels push -p . > ../kaggle_push_log.txt 2>&1
          EXIT=$?
          cat ../kaggle_push_log.txt
          if grep -qi "409\|conflict\|does not resolve" ../kaggle_push_log.txt; then
            echo "::error::Kaggle 409 conflict — title/id mismatch"
            cat ../kaggle_push_log.txt
            exit 1
          fi
          if [ $EXIT -ne 0 ]; then
            echo "::error::kaggle push failed with exit $EXIT"
            exit $EXIT
          fi
          echo "✅ Kernel pushed at $(date -u)"          echo "Pushed at $(date -u)"

      - name: Wait for kernel to finish
        env:
          MAX_MINUTES: ${{ github.event.inputs.max_minutes || '120' }}
        run: |
          WAIT_SEC=$(( (MAX_MINUTES + 20) * 60 ))
          echo "Waiting ${WAIT_SEC}s for Kaggle kernel (${MAX_MINUTES}min + 20min buffer)"
          echo "Start: $(date -u)"
          sleep $WAIT_SEC
          echo "End: $(date -u)"

      - name: Download kernel output
        run: |
          mkdir -p kaggle_output
          for attempt in 1 2 3; do
            echo "Download attempt $attempt"
            kaggle kernels output "ahmedxdx/aion-gpu-training" -p kaggle_output/ && break || sleep 60
          done
          ls -la kaggle_output/ 2>/dev/null || echo "No files"
          find kaggle_output -type f | head -20

      - name: Merge GPU checkpoint
        run: |
          mkdir -p checkpoints
          find kaggle_output -name "aion_best.pt" -exec cp {} checkpoints/ \;
          find kaggle_output -name "config.json" -exec cp {} checkpoints/ \;
          find kaggle_output -name "tokenizer.json" -exec cp {} checkpoints/ \;
          find kaggle_output -name "kaggle_result.json" -exec cp {} checkpoints/ \;
          find kaggle_output -name "hybrid_system_test.json" -exec cp {} checkpoints/ \;
          find kaggle_output -name "*.log" -exec cp {} kaggle_kernel_log.txt \;
          echo "Result:"
          cat checkpoints/kaggle_result.json 2>/dev/null || echo "No result"

      - name: Install PyTorch for validation
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu -q && pip install numpy -q

      - name: Validate checkpoint
        run: python3 scripts/validate_merged.py || echo "Skipped"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aion-kaggle-gpu-${{ github.run_number }}
          path: checkpoints/
          retention-days: 90

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "kaggle-gpu-v1.0.${{ github.run_number }}"
          name: "AION Kaggle-GPU Gen ${{ github.run_number }}"
          body: "Trained ${{ github.event.inputs.max_minutes || '120' }} min on Kaggle"
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit results back
        run: |
          git config user.name "AION-Bridge"
          git config user.email "bridge@aion.ai"
          git add checkpoints/ kaggle_kernel_log.txt kaggle_push_log.txt 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Kaggle GPU gen ${{ github.run_number }}"
          git push || true
