name: GVR Kaggle Bearer Token

on:
  workflow_dispatch:
    inputs:
      kaggle_bearer_token:
        description: 'Kaggle Bearer Token (KGAT_...)'
        required: true
        type: string

jobs:
  connect:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - name: Setup
        run: pip install requests -q

      - name: Connect to Kaggle with Bearer Token
        env:
          KAGGLE_BEARER: ${{ github.event.inputs.kaggle_bearer_token }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          python3 - << 'EOF'
          import requests, os, json, base64

          bearer = os.environ.get("KAGGLE_BEARER", "")
          pat    = os.environ.get("GH_PAT", "")

          print(f"Bearer token: {bearer[:12]}... (len={len(bearer)})")

          headers = {
              "Authorization": f"Bearer {bearer}",
              "Content-Type": "application/json"
          }

          # Test 1: List kernels
          r1 = requests.get(
              "https://www.kaggle.com/api/v1/kernels",
              headers=headers,
              params={"mine": True, "pageSize": 5}
          )
          print(f"List kernels: {r1.status_code}")
          print(r1.text[:300])

          # Test 2: Push GVR kernel
          with open("kaggle_kernel/gvr_kaggle_train.py") as f:
              code = f.read()

          payload = {
              "newTitle": "GVR GPU Training",
              "text": code,
              "language": "python",
              "kernelType": "script",
              "isPrivate": True,
              "enableGpu": True,
              "enableInternet": True,
          }

          r2 = requests.post(
              "https://www.kaggle.com/api/v1/kernels",
              headers=headers,
              json=payload
          )
          print(f"\nPush kernel: {r2.status_code}")
          print(r2.text[:400])

          # Save result
          result = {
              "bearer_len": len(bearer),
              "list_status": r1.status_code,
              "push_status": r2.status_code,
              "push_response": r2.text[:300]
          }

          content = base64.b64encode(json.dumps(result, indent=2).encode()).decode()
          check = requests.get(
              "https://api.github.com/repos/alhsryahmd266-jpg/omega-ai/contents/kaggle_bearer_result.json",
              headers={"Authorization": f"token {pat}"}
          )
          body = {"message": "GVR: Bearer token result", "content": content}
          if check.status_code == 200:
              body["sha"] = check.json()["sha"]

          save = requests.put(
              "https://api.github.com/repos/alhsryahmd266-jpg/omega-ai/contents/kaggle_bearer_result.json",
              headers={"Authorization": f"token {pat}"},
              json=body
          )
          print(f"\nSaved: {save.status_code}")
          EOF

      - name: Wait for kernel & download
        env:
          KAGGLE_BEARER: ${{ github.event.inputs.kaggle_bearer_token }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          python3 - << 'EOF'
          import requests, os, json, base64, time

          bearer = os.environ.get("KAGGLE_BEARER", "")
          pat    = os.environ.get("GH_PAT", "")
          headers = {"Authorization": f"Bearer {bearer}"}

          print("Waiting 120 minutes for GPU training...")
          time.sleep(7200)

          # Download results
          r = requests.get(
              "https://www.kaggle.com/api/v1/kernels/output",
              headers=headers,
              params={"userName": "ahmedxdx", "kernelSlug": "gvr-gpu-training"}
          )
          print(f"Download: {r.status_code}")

          result = {"download_status": r.status_code, "response": r.text[:300]}
          content = base64.b64encode(json.dumps(result, indent=2).encode()).decode()

          check = requests.get(
              "https://api.github.com/repos/alhsryahmd266-jpg/omega-ai/contents/checkpoints/gvr_final.json",
              headers={"Authorization": f"token {pat}"}
          )
          body = {"message": "GVR: Training complete", "content": content}
          if check.status_code == 200:
              body["sha"] = check.json()["sha"]

          requests.put(
              "https://api.github.com/repos/alhsryahmd266-jpg/omega-ai/contents/checkpoints/gvr_final.json",
              headers={"Authorization": f"token {pat}"},
              json=body
          )
          print("Done!")
          EOF
